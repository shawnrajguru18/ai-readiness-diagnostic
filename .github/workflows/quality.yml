name: Code Quality (Linting, Formatting, Complexity)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  formatting:
    runs-on: ubuntu-latest
    name: Code Formatting (Black, isort)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install formatting tools
        run: |
          pip install black isort

      - name: Check Black formatting
        run: black --check app/ tests/ || echo "Black formatting issues found"
        continue-on-error: true

      - name: Check isort import ordering
        run: isort --check-only --profile black app/ tests/ || echo "isort issues found"
        continue-on-error: true

      - name: Report formatting issues
        if: failure()
        run: |
          echo "Run locally: black app/ tests/ && isort --profile black app/ tests/"

  linting:
    runs-on: ubuntu-latest
    name: Linting (pylint, flake8)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pylint flake8 flake8-docstrings flake8-bugbear flake8-comprehensions

      - name: Run flake8
        run: |
          flake8 app/ tests/ --count --statistics --show-source \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=.venv,__pycache__ || true
        continue-on-error: true

      - name: Run pylint
        run: |
          pylint app/ --exit-zero --disable=too-many-arguments \
            --disable=missing-docstring --disable=too-few-public-methods \
            --rating=no || true
        continue-on-error: true

  type-checking:
    runs-on: ubuntu-latest
    name: Type Checking (mypy)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install mypy and dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy types-PyYAML types-requests

      - name: Run mypy type checker
        run: |
          mypy app/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

  complexity:
    runs-on: ubuntu-latest
    name: Complexity Analysis (Radon, McCabe)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install complexity tools
        run: pip install radon

      - name: Check cyclomatic complexity
        run: |
          echo "=== Cyclomatic Complexity ==="
          radon cc app/ -a -s || true
          echo ""
          echo "=== Maintainability Index ==="
          radon mi app/ -s || true
        continue-on-error: true

  dead-code:
    runs-on: ubuntu-latest
    name: Dead Code Detection (vulture)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install vulture
        run: pip install vulture

      - name: Check for dead code
        run: |
          vulture app/ --min-confidence 80 || true
        continue-on-error: true

  quality-summary:
    runs-on: ubuntu-latest
    needs: [formatting, linting, type-checking, complexity, dead-code]
    if: always()
    name: Quality Summary

    steps:
      - name: Create quality summary
        run: |
          echo "# Code Quality Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Black formatting check" >> $GITHUB_STEP_SUMMARY
          echo "✓ isort import ordering check" >> $GITHUB_STEP_SUMMARY
          echo "✓ flake8 linting" >> $GITHUB_STEP_SUMMARY
          echo "✓ pylint analysis" >> $GITHUB_STEP_SUMMARY
          echo "✓ mypy type checking" >> $GITHUB_STEP_SUMMARY
          echo "✓ Cyclomatic complexity analysis" >> $GITHUB_STEP_SUMMARY
          echo "✓ Dead code detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See job logs for detailed output. Fix any failures before merging." >> $GITHUB_STEP_SUMMARY
