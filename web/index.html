/* ---------------- Hexagonal radar (custom SVG, the signature visual) ---------------- */
function Radar({dims, color, size=360}) {
  const n = dims.length, cx=size/2, cy=size/2, R=size*0.34;
  const pt=(i,frac)=>{const a=(2*Math.PI*i/n)-Math.PI/2;return [cx+R*frac*Math.cos(a),cy+R*frac*Math.sin(a)];};
  const ring=t=>dims.map((_,i)=>pt(i,t).join(",")).join(" ");
  const you=dims.map((d,i)=>pt(i,d.score/100).join(",")).join(" ");
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="fade">
      {[0.25,0.5,0.75,1].map((t,k)=><polygon key={k} points={ring(t)} fill="none" stroke="#D9D5CE" strokeWidth="1"/>)}
      {dims.map((_,i)=>{const[x,y]=pt(i,1);return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#E6E1DA"/>;})}
      <polygon points={you} fill={color+"55"} stroke={color} strokeWidth="2.5"/>
      {dims.map((d,i)=>{const[x,y]=pt(i,d.score/100);return <circle key={i} cx={x} cy={y} r="3.5" fill={color} stroke="#0E1020" strokeWidth="1"/>;})}
      {dims.map((d,i)=>{const[x,y]=pt(i,1.17);const anchor=Math.abs(x-cx)<14?"middle":(x>cx?"start":"end");
        return <text key={i} x={x} y={y} fontSize="11" fontWeight="600" fill="#0E1020" textAnchor={anchor} dominantBaseline="middle">{d.label.split(" & ")[0]}</text>;})}
      {dims.map((d,i)=>{const[x,y]=pt(i,d.score/100);return <text key={"s"+i} x={x} y={y-9} fontSize="11" fontWeight="700" fill="#0E1020" textAnchor="middle">{d.score}</text>;})}
    </svg>
  );
}

/* Value-difficulty 2x2 (light scatter; priority = high value, low difficulty) */
function Vd2x2({items, size=300}){
  if(!items || !items.length) return null;
  const pad=46, s=size;
  const X=(d)=>pad + Math.max(.05,Math.min(.95,d))*s;
  const Y=(v)=>pad + (1-Math.max(.05,Math.min(.95,v)))*s;
  return (
    <svg width={s+pad*1.6} height={s+pad*1.3} viewBox={`0 0 ${s+pad*1.6} ${s+pad*1.3}`} role="img" aria-label="Value vs difficulty">
      <rect x={pad} y={pad} width={s/2} height={s/2} fill="#EAF2FF"/>
      <rect x={pad} y={pad} width={s} height={s} fill="none" stroke="#E6E1DA"/>
      <line x1={pad+s/2} y1={pad} x2={pad+s/2} y2={pad+s} stroke="#E6E1DA"/>
      <line x1={pad} y1={pad+s/2} x2={pad+s} y2={pad+s/2} stroke="#E6E1DA"/>
      <text x={pad+6} y={pad+14} fontSize="10" fontWeight="700" fill="#004AAC">PRIORITY</text>
      <text x={pad} y={pad+s+16} fontSize="10" fill="#3D3F50">Low difficulty</text>
      <text x={pad+s} y={pad+s+16} fontSize="10" fill="#3D3F50" textAnchor="end">High difficulty</text>
      <text x={18} y={pad+6} fontSize="10" fill="#3D3F50" transform={`rotate(-90 18 ${pad+6})`}>High value</text>
      <text x={18} y={pad+s} fontSize="10" fill="#3D3F50" textAnchor="end" transform={`rotate(-90 18 ${pad+s})`}>Low value</text>
      {items.map((it,i)=>(
        <g key={i}><circle cx={X(it.difficulty_score)} cy={Y(it.value_score)} r="5" fill="#004AAC"/>
          <text x={X(it.difficulty_score)+8} y={Y(it.value_score)+3} fontSize="10.5" fill="#0E1020">{it.opportunity}</text></g>
      ))}
    </svg>
  );
}

/* ---------------- Screen 2: Questionnaire ---------------- */
function Assessment({pool, onSubmit, onBack, onVoice, initialAnswers}) {
  const all = pool ? pool.questions : [];
  const dimLabels = pool ? pool.dimensions : {};
  const [answers,setAnswers]=useState(initialAnswers||{});
  const visible = all.filter(q=>{
    if(q.skip_if){const r=answers[q.skip_if.question];const v=r&&r.option_id;if(v&&q.skip_if.answer_in.includes(v))return false;}
    if(q.branch_if){const r=answers[q.branch_if.question];const sel=(r&&r.option_ids)||[];if(!sel.some(x=>q.branch_if.answer_in.includes(x)))return false;}
    return true;
  });
  const [i,setI]=useState(0);
  const q = visible[Math.min(i,visible.length-1)];
  if(!q) return null;
  const pos = i+1, total=visible.length;
  const dimName=(dimLabels[q.dimension]&&dimLabels[q.dimension].label)||q.dimension;
  const dimQ = visible.filter(x=>x.dimension===q.dimension);
  const dimIdx = dimQ.indexOf(q)+1;
  const ans=answers[q.id]||{};
  const setAns=(v)=>setAnswers({...answers,[q.id]:v});
  const answered=()=>{ if(q.type==="single_select")return!!ans.option_id; if(q.type==="scale_1_5")return ans.scale_value!=null;
    if(q.type==="multi_select")return(ans.option_ids||[]).length>0; if(q.type==="open_short")return true; return false; };
  const next=()=>{ if(i+1>=total){onSubmit(answers);} else setI(i+1); };
  const minsLeft=Math.max(1,Math.round((total-i)*1.1));
  return (
    <div className="min-h-screen bg-canvas">
      <div className="max-w-3xl mx-auto px-6 py-6 flex justify-between items-center"><Wordmark/>
        <div className="flex items-center gap-4">
          {onVoice && <button onClick={()=>onVoice(answers)} className="text-xs font-semibold text-royal hover:underline flex items-center gap-1"><span aria-hidden="true">🎙️</span> Switch to voice</button>}
          <span className="text-xs text-ink">~{minsLeft} min left</span>
        </div></div>
      <div className="max-w-3xl mx-auto px-6">
        <div className="flex items-center justify-between text-sm font-semibold text-midnight mb-2">
          <span>{dimName} · {dimIdx} of {dimQ.length}</span><span className="text-ink">{pos}/{total}</span></div>
        <div className="h-1.5 bg-black/10 rounded-full overflow-hidden mb-10"><div className="h-full bg-royal transition-all" style={{width:`${(pos/total)*100}%`}}/></div>
        <div className="fade" key={q.id}>
          <h2 className="display text-3xl font-bold leading-snug mb-8">{q.text}</h2>
          {q.type==="single_select" && (
            <div className="space-y-3">{q.options.map(o=>(
              <button key={o.id} onClick={()=>setAns({option_id:o.id})}
                className={`w-full text-left px-5 py-4 rounded-xl border-2 transition ${ans.option_id===o.id?"border-royal bg-royal/5":"border-black/10 bg-white hover:border-black/25"}`}>{o.text}</button>
            ))}</div>)}
          {q.type==="scale_1_5" && (
            <div><div className="grid grid-cols-5 gap-2">{q.scale_anchors.map(a=>(
              <button key={a.value} onClick={()=>setAns({scale_value:a.value})}
                className={`py-5 rounded-xl border-2 font-bold text-lg ${ans.scale_value===a.value?"border-royal bg-royal/5":"border-black/10 bg-white hover:border-black/25"}`}>{a.value}</button>
            ))}</div>
            <div className="flex justify-between text-xs text-ink mt-2"><span>{q.scale_anchors[0].text}</span><span className="text-right">{q.scale_anchors[4].text}</span></div>
            {ans.scale_value!=null && <p className="text-sm text-ink mt-3">{q.scale_anchors.find(a=>a.value===ans.scale_value).text}</p>}</div>)}
          {q.type==="multi_select" && (
            <div className="space-y-3">{q.options.map(o=>{const sel=(ans.option_ids||[]).includes(o.id);
              return <button key={o.id} onClick={()=>{let s=new Set(ans.option_ids||[]);sel?s.delete(o.id):s.add(o.id);setAns({option_ids:[...s]});}}
                className={`w-full text-left px-5 py-3.5 rounded-xl border-2 flex items-center gap-3 ${sel?"border-royal bg-royal/5":"border-black/10 bg-white hover:border-black/25"}`}>
                <span className={`w-4 h-4 rounded border ${sel?"bg-royal border-royal":"border-black/30"}`}></span>{o.text}</button>;})}</div>)}
          {q.type==="open_short" && (
            <div><textarea maxLength={q.open_answer_max_chars||500} value={ans.text||""} onChange={e=>setAns({text:e.target.value})}
              rows={4} className="w-full p-4 rounded-xl border-2 border-black/10 focus:border-royal focus:outline-none"/>
            <div className="text-xs text-ink text-right mt-1">{(q.open_answer_max_chars||500)-((ans.text||"").length)} characters left</div></div>)}
        </div>
        <div className="flex justify-between mt-10 pb-16">
          <Btn kind="ghost" onClick={()=>i===0?onBack():setI(i-1)}>← Back</Btn>
          <Btn onClick={next} className={!answered()?"opacity-40 pointer-events-none":""}>{i+1>=total?"Submit assessment":"Next →"}</Btn>
        </div>
      </div>
    </div>
  );
}

          {[`AI agents research ${company||"your company"} — financials, news, tech posture`,
            "Our synthesis engine scores your readiness across six dimensions",
            "A DXC senior partner reviews and approves your scorecard"].map((s,k)=>(
            <li key={k} className="flex gap-4 items-start"><span className="bg-midnight text-white w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold flex-none">{k+1}</span><span className="pt-1">{s}</span></li>
          ))}
        </ol>
        <p className="mt-8 text-ink">You'll receive your scorecard within 24 hours at <b className="text-midnight">{email||"your email"}</b>. A personal portal link will arrive with your results.</p>
        <div className="mt-8"><Btn onClick={onView}>Preview your scorecard →</Btn></div>
      </div>
    </div>
  );
}

/* ---------------- Screen 4: Scorecard ---------------- */

      <div className="max-w-5xl mx-auto px-8 pb-24">
        <div className="flex flex-wrap justify-between items-start gap-4 border-b border-black/10 pb-6">
          <div><div className="text-xs uppercase tracking-widest text-ink">AI Readiness Diagnostic</div>
            <h1 className="display text-4xl font-extrabold mt-1">{sc.company_name}</h1>

            <div className="text-xs text-ink mt-1 max-w-[220px]">{sc.peer_reference}</div></div>
        </div>

        <div className="grid md:grid-cols-2 gap-8 items-center mt-8 bg-white rounded-2xl border border-black/10 p-6">
          <div className="flex justify-center"><Radar dims={sc.dimensions} color={sc.overall_color}/></div>
          <div className="space-y-3">
            {sc.dimensions.map(d=>(
              <div key={d.dimension}>
                <div className="flex justify-between text-sm font-semibold"><span>{d.label}{d.informational?<span className="text-ink font-normal"> · informational</span>:""}</span>
                  <span>{d.score} · <span style={{color:"#0E1020"}}>{d.tier}</span></span></div>
                <div className="h-2 bg-black/10 rounded mt-1 overflow-hidden"><div className="h-full rounded" style={{width:`${d.score}%`,background:d.color}}/></div>
              </div>
            ))}

        </div>

        <div className="mt-8 bg-white rounded-2xl border border-black/10 p-7">
          <div className="flex items-center gap-2 mb-4"><span className="w-2.5 h-2.5 bg-royal inline-block"></span><h2 className="text-xs font-bold uppercase tracking-widest">What we found</h2></div>
          <ol className="space-y-4">{sc.findings.map((f,k)=>(
            <li key={f.finding_id} className="flex gap-3"><span className="font-bold text-royal">{k+1}</span>
              <span className="text-[15px] leading-relaxed"><b>{f.headline}.</b> {f.body}</span></li>))}</ol>
        </div>

        <div className="grid md:grid-cols-2 gap-6 mt-6">
          <div className="bg-white rounded-2xl border-l-4 border-royal p-6">
            <h2 className="text-xs font-bold uppercase tracking-widest text-royal mb-2">Recommended next step</h2>
            <p className="text-[15px] leading-relaxed">{sc.recommended_next_step.body}</p>
            <p className="text-sm text-ink mt-3">Duration: {sc.recommended_next_step.duration_estimate_weeks}.</p>
            <a href={`mailto:${sc.recommended_next_step.contact_email}`} className="inline-block mt-3 text-royal font-semibold hover:underline">
              Continue the conversation → {sc.recommended_next_step.contact_name}, {sc.recommended_next_step.contact_title}</a>
          </div>
          <div className="bg-white rounded-2xl border border-black/10 p-6">
            <h2 className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"#9a6a00"}}>90-day quick wins</h2>
            <ul className="space-y-2">{sc.quick_wins.map((q,k)=>(
              <li key={k} className="text-sm"><b>{q.pattern_name}</b> — {q.one_line_description} <span className="text-ink">({q.timeline_to_value})</span></li>))}</ul>
            <button onClick={onQuickWins} className="mt-4 text-royal font-semibold hover:underline text-sm">View full quick wins memo →</button>

/* ---------------- Screen 5: Quick wins memo ---------------- */
function QuickWins({sc, onBack}) {

    <div className="min-h-screen bg-canvas">
      <div className="max-w-4xl mx-auto px-8 py-6 flex justify-between items-center"><Wordmark/>
        <button onClick={onBack} className="text-sm text-royal font-semibold hover:underline">← Back to scorecard</button></div>
      <div className="max-w-4xl mx-auto px-8 pb-24">
        <div className="text-xs uppercase tracking-widest" style={{color:"#9a6a00"}}>90-day quick wins</div>
        <h1 className="display text-4xl font-extrabold mt-1">{sc.company_name}</h1>
        <p className="text-ink mt-3 max-w-2xl">Quick wins are AI patterns you can put in production in 90 days or less. Each has documented enterprise deployments with measurable results. They build momentum and prove execution capacity while the strategic roadmap takes shape through Discovery.</p>
        <div className="grid md:grid-cols-3 gap-5 mt-8">
          {sc.quick_wins.map((q,k)=>(
            <div key={k} className="bg-white rounded-2xl border border-black/10 p-6">
              <span className="w-2.5 h-2.5 bg-royal inline-block mb-3"></span>
              <h3 className="display text-xl font-bold">{q.pattern_name}</h3>
              <p className="text-sm italic text-ink mt-1">{q.one_line_description}</p>
              <p className="text-sm mt-4"><b>What this would do:</b> {q.what_this_would_do}</p>
              <p className="text-sm mt-3 font-semibold">Prerequisites you have:</p>

              <div className="mt-4 text-sm"><b>Expected outcome:</b> {q.expected_outcome_range}</div>

/* ---------------- Screen 2b: Voice interview (ElevenLabs) ----------------
   The agent should be configured to call two client tools as it runs the interview:
     record_answer({question_id, option_id})   // e.g. {"question_id":"Q1.1","option_id":"B"}
       (or {question_id, scale_value} for 1-5 questions)
     finish_interview()                          // ends -> scores -> shows the scorecard
   These are registered on the widget below. Without that agent config, the prospect can
   still talk to the interviewer, then click "See my scorecard". */
function VoiceInterview({company, industry, name, role, priorAnswers, onFinish, onChat, onBack}) {
  const collected = React.useRef({...(priorAnswers||{})});
  const [count, setCount] = useState(Object.keys(priorAnswers||{}).length);
  const persona = personaFromRole(role||"");
  const framing = FRAMING_FOR[persona];
  const configured = ELEVENLABS_AGENT_ID && !/REPLACE_WITH/.test(ELEVENLABS_AGENT_ID);
  useEffect(()=>{
    if(!configured) return;
    if(!document.getElementById("convai-lib")){
      const s=document.createElement("script"); s.id="convai-lib"; s.async=true;
      s.src="https://unpkg.com/@elevenlabs/convai-widget-embed"; document.body.appendChild(s);
    }
    const el=document.getElementById("convai-el");
    if(!el) return;
    const onCall=(e)=>{ try{
      e.detail.config.clientTools = {
        record_answer:(p={})=>{ const{question_id,option_id,scale_value,option_ids}=p;
          if(question_id){ collected.current[question_id]={option_id,scale_value,option_ids}; setCount(Object.keys(collected.current).length);} return "recorded"; },
        finish_interview:()=>{ onFinish(collected.current); return "completed"; },
      };
      e.detail.config.dynamicVariables = {
        prospect_name: name||"there", prospect_role: role||"", company_name: company||"your organization",
        industry: industry||"", persona, framing_preference: framing,
        already_answered: Object.keys(collected.current).join(", ")||"none",
      };
    }catch(err){} };
    el.addEventListener("elevenlabs-convai:call", onCall);
    return ()=>el.removeEventListener("elevenlabs-convai:call", onCall);
  },[]);
  return (
    <div className="min-h-screen bg-canvas text-midnight">
      <div className="max-w-3xl mx-auto px-6 py-6 flex justify-between items-center"><Wordmark/>
        <button onClick={onBack} className="text-sm text-royal font-semibold hover:underline">← Back</button></div>
      <div className="max-w-2xl mx-auto px-6 pb-24 fade">
        <div className="text-xs uppercase tracking-widest text-royal font-bold">Voice interview</div>
        <h1 className="display text-4xl font-extrabold mt-1">Talk it through.</h1>
        <p className="text-ink mt-3">The DXC AI interviewer will guide {company||"you"} through the six readiness dimensions by voice. Speak naturally; it adapts and asks follow-ups. When you finish, we score it and show your scorecard.</p>
        <ol className="mt-6 space-y-2 text-sm text-ink">
          <li>1. Tap the voice assistant in the bottom-right corner and allow microphone access.</li>
          <li>2. Answer in your own words across all six dimensions.</li>
          <li>3. Say “I’m done”, or click below, to generate your scorecard.</li>
        </ol>
        {!configured && (
          <div className="mt-6 p-4 rounded-xl border border-risk/40 bg-risk/5 text-sm">
            Voice agent not configured. Add an ElevenLabs <code>ELEVENLABS_AGENT_ID</code> in the page, or take it by chat.
          </div>
        )}
        {configured && count>0 && <div className="mt-6 text-sm text-royal font-semibold">{count} of 20 answers captured by voice.</div>}
        <div className="mt-8 flex flex-wrap gap-3">
          <Btn onClick={()=>onFinish(collected.current)}>See my scorecard →</Btn>
          <Btn kind="ghost" onClick={()=>onChat(collected.current)}>Switch to chat instead</Btn>
        </div>
        <p className="mt-4 text-[12px] text-ink/60">Note: the voice agent must be Public and allow this site's origin in ElevenLabs. The corner widget is the live agent.</p>
      </div>
      {configured && <elevenlabs-convai id="convai-el" agent-id={ELEVENLABS_AGENT_ID}></elevenlabs-convai>}
    </div>
  );
}

/* ---------------- App shell ---------------- */
function App() {
  const [screen,setScreen]=useState("landing");
  const [pool,setPool]=useState(null);
  const [sc,setSc]=useState(DEMO);
  const [ctx,setCtx]=useState({});
  const [answers,setAnswers]=useState({});   // shared between chat + voice
  const [loading,setLoading]=useState(false);

  useEffect(()=>{ fetch(API+"/api/questions").then(r=>r.json()).then(setPool).catch(()=>setPool(null)); },[]);

  const begin=(f,c)=>{ setCtx({f,c}); if(!pool){ /* offline: skip to demo scorecard */ setSc(DEMO); setScreen("submitted"); return;} setScreen("assessment"); };
  const voice=(f,c)=>{ setCtx({f,c}); setAnswers({}); setScreen("voice"); };
  const voiceFinish=(answers)=>{ if(answers && Object.keys(answers).length){ submit(answers); } else { setSc(DEMO); setScreen("submitted"); } };
  const submit=(answers)=>{
    setLoading(true);
    const responses={}; Object.entries(answers).forEach(([k,v])=>responses[k]=v);
    const body={submission:ctx.f, consent:{c1_use_for_scorecard:true, ...(ctx.c||{})}, responses, persona_hint:null};
    fetch(API+"/api/assess",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
      .then(r=>r.json()).then(d=>{setSc(d);setLoading(false);setScreen("submitted");})
      .catch(()=>{setSc(DEMO);setLoading(false);setScreen("submitted");});
  };

  if(screen==="landing") return <Landing onBegin={begin} onVoice={voice} onSample={()=>{setSc(DEMO);setScreen("scorecard");}}/>;
  if(screen==="assessment") return <Assessment pool={pool} initialAnswers={answers} onSubmit={submit} onBack={()=>setScreen("landing")} onVoice={(a)=>{setAnswers(a||{});setScreen("voice");}}/>;
  if(screen==="voice") return <VoiceInterview company={ctx.f&&ctx.f.company_name_raw} industry={ctx.f&&ctx.f.industry_label} name={ctx.f&&ctx.f.prospect_name} role={ctx.f&&ctx.f.prospect_role} priorAnswers={answers} onFinish={voiceFinish} onChat={(a)=>{setAnswers(a||{});setScreen(pool?"assessment":"landing");}} onBack={()=>setScreen("landing")}/>;
  if(screen==="submitted") return <Submitted company={(ctx.f&&ctx.f.company_name_raw)||sc.company_name} email={ctx.f&&ctx.f.prospect_email} onView={()=>setScreen("scorecard")}/>;
  if(screen==="scorecard") return <Scorecard sc={sc} onQuickWins={()=>setScreen("quickwins")}/>;
  if(screen==="quickwins") return <QuickWins sc={sc} onBack={()=>setScreen("scorecard")}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
