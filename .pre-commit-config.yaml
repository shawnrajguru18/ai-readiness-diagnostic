# Pre-commit hooks: Local checks before pushing to remote
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files
# Bypass (not recommended): git commit --no-verify

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(\..*|.*\.min\.css|.*\.min\.js)$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: mixed-line-ending
      - id: check-merge-conflict

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.11
        exclude: ^(\.venv|venv|__pycache__)

  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black']
        exclude: ^(\.venv|venv|__pycache__)

  # Python linting - flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        exclude: ^(\.venv|venv|__pycache__|migrations)
        additional_dependencies:
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-docstrings

  # Python type checking - mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML
          - types-requests
        args: ['--ignore-missing-imports', '--no-error-summary']
        exclude: ^(\.venv|venv|__pycache__|migrations|tests)

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(\.venv|venv|__pycache__|\.git)

  # Docstring formatting (pydocstyle)
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        exclude: ^(\.venv|venv|__pycache__|tests)
        args: ['--convention=google']

  # Security: bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ['-c', '.bandit.yaml', '-ll']
        exclude: ^(\.venv|venv|__pycache__|tests)

  # YAML validation
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--config-data, '{extends: default, rules: {line-length: {max: 120}}}']
        exclude: ^(\.venv|venv)

  # Terraform formatting (if terraform is installed)
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.88.1
    hooks:
      - id: terraform_fmt
        exclude: ^(\.venv|venv)
      - id: terraform_validate
        exclude: ^(\.venv|venv)
      - id: terraform_docs
        exclude: ^(\.venv|venv)
      - id: terraform_tfsec
        exclude: ^(\.venv|venv)
        args: ['-s', 'CRITICAL,HIGH']

# Default behavior
default_language_version:
  python: python3.11

ci:
  autofix_commit_msg: 'Automatic fixes by pre-commit hooks'
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'Update pre-commit hooks'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
